<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsChat AI — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 40px; width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center; }
  .logo-icon { width: 40px; height: 40px; background: #25D366; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .logo span { font-size: 18px; font-weight: 700; }
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12.5px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.15s; }
  input:focus { border-color: #25D366; }
  .btn { width: 100%; padding: 11px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; transition: background 0.15s; }
  .btn:hover { background: #1ebe5a; }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
  .footer-link a { color: #25D366; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <span>WhatsChat AI</span>
  </div>
  <h2>Create your account</h2>
  <p class="subtitle">Start your WhatsApp marketing journey</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Business Name</label>
    <input type="text" id="businessName" placeholder="My Business">
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@business.com">
  </div>
  <div class="form-group">
    <label>Phone (optional)</label>
    <input type="text" id="phone" placeholder="+92 300 1234567">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 8 characters">
  </div>

  <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>

  <div class="footer-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = "../dashboard.html";

  async function handleRegister() {
    const businessName = document.getElementById("businessName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("registerBtn");
    const errEl = document.getElementById("errorMsg");

    errEl.style.display = "none";

    if (!businessName || !email || !password) {
      errEl.textContent = "Business name, email aur password zaroori hain";
      errEl.style.display = "block";
      return;
    }

    setLoading(btn, true);
    try {
      await Auth.register(businessName, email, password, phone || null);
      showToast("Account created! Redirecting... ✅");
      setTimeout(() => window.location.href = "../dashboard.html", 600);
    } catch (err) {
      errEl.textContent = err.message || "Registration failed";
      errEl.style.display = "block";
    } finally {
      setLoading(btn, false);
    }
  }
</script>
</body>
</html>
