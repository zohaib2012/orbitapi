<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="../assets/images/weblogo.jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsChat AI — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg,#f0fdf4 0%,#f4f6f8 50%,#ecfdf5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; position:relative; overflow-x:hidden; padding:20px;}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(37,211,102,0.18) 0%,transparent 70%);border-radius:50%;animation:floatR 8s ease-in-out infinite;z-index:0;}
  body::after{content:'';position:fixed;bottom:-250px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(18,140,126,0.15) 0%,transparent 70%);border-radius:50%;animation:floatR 10s ease-in-out infinite reverse;z-index:0;}
  @keyframes floatR{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,30px) scale(1.05)}}
  .card { background: rgba(255,255,255,0.96); backdrop-filter:blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.8); padding: 40px; width: 420px; box-shadow: 0 25px 60px -12px rgba(37,211,102,0.18),0 10px 30px rgba(0,0,0,.08); position:relative; z-index:1;}
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center; }
  .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg,#25D366,#128C7E); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow:0 8px 20px rgba(37,211,102,0.35); transition:transform .35s ease;}
  .logo:hover .logo-icon{transform:rotate(-6deg) scale(1.08);}
  .logo span { font-size: 20px; font-weight: 700; background:linear-gradient(135deg,#25D366,#128C7E);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12.5px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.15s; }
  input:focus { border-color: #25D366; }
  .btn { width: 100%; padding: 13px; background: linear-gradient(135deg,#25D366 0%,#128C7E 100%); color: white; border: none; border-radius: 10px; font-size: 14.5px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; box-shadow: 0 6px 18px rgba(37,211,102,0.30); letter-spacing: .02em;}
  .btn:hover { box-shadow: 0 10px 28px rgba(37,211,102,0.42); transform: translateY(-1px); filter: brightness(1.06);}
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
  .footer-link a { color: #25D366; font-weight: 600; text-decoration: none; }
</style>
<link rel="stylesheet" href="../assets/css/modern-ui.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <span>WhatsChat AI</span>
  </div>
  <h2>Create your account</h2>
  <p class="subtitle">Start your WhatsApp marketing journey</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Business Name</label>
    <input type="text" id="businessName" placeholder="My Business">
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@business.com">
  </div>
  <div class="form-group">
    <label>Phone (optional)</label>
    <input type="text" id="phone" placeholder="+92 300 1234567">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 8 characters">
  </div>

  <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>

  <div class="footer-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = "../dashboard.html";

  async function handleRegister() {
    const businessName = document.getElementById("businessName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("registerBtn");
    const errEl = document.getElementById("errorMsg");

    errEl.style.display = "none";

    if (!businessName || !email || !password) {
      errEl.textContent = "Business name, email aur password zaroori hain";
      errEl.style.display = "block";
      return;
    }

    setLoading(btn, true);
    try {
      await Auth.register(businessName, email, password, phone || null);
      showToast("Account created! Redirecting... ✅");
      setTimeout(() => window.location.href = "../dashboard.html", 600);
    } catch (err) {
      errEl.textContent = err.message || "Registration failed";
      errEl.style.display = "block";
    } finally {
      setLoading(btn, false);
    }
  }
</script>
</body>
</html>
